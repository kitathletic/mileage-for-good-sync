name: One-shot store cleanup
 
# Run this ONCE manually to fix the cycle contamination from the patch
# transition. After running, the cycle / this-week / last-week leaderboards
# will be empty until new activities are logged. All-time stays intact.
 
on:
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
 
      - name: Run cleanup script
        run: node scripts/cleanup-store.mjs
 
      - name: Commit reset store
        run: |
          git config user.name "strava-sync-bot"
          git config user.email "strava-sync-bot@users.noreply.github.com"
          git add data/activities.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: reset first_seen_at on store entries (cycle re-baseline)"
            git push
          fi
